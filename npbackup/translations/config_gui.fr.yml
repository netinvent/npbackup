  read_data_subset_explanation: Taille en bytes d'un échantillon de données à lire lors des vérifications de dépot (check). Permet de vérifier les données sans lire l'intégralité du dépot, ce qui peut être très long pour les grands dépots. Si 0 ou vide, la vérification lira toutes les données (ce qui est le comportement par défaut de restic)
