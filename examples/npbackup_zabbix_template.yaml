# NPBackup Zabbix Template
# Compatible with Zabbix 6.0+
#
# This template uses a trapper-based Low-Level Discovery (LLD) rule.
# NPBackup sends LLD data via npbackup.discovery, which causes Zabbix
# to instantiate item prototypes for each repo/action combination.
#
# Setup:
#   1. Import this template into Zabbix (Configuration > Templates > Import)
#   2. Link the template to the host whose name matches the "instance" value
#      configured in your npbackup monitoring settings (monitoring.instance)
#   3. Ensure the Zabbix server accepts trapper data on port 10051
#   4. Run a backup - npbackup will send discovery + metric data automatically
zabbix_export:
  version: '6.0'
  date: '2026-03-13T21:00:00Z'
  groups:
    - uuid: 3bc3795c997b49e5a9d5b0775ea6f252
      name: Templates/Applications
  templates:
    - uuid: 251ee3ca48214af490b72e2e4c389372
      template: npbackup_trapper
      name: 'NPBackup by Zabbix trapper'
      description: |
        Monitors NPBackup operations via Zabbix sender/trapper protocol.
        Requires npbackup to be configured with Zabbix monitoring enabled.
        See https://github.com/netinvent/npbackup
      groups:
        - name: Templates/Applications
      discovery_rules:
        - uuid: ce76ca8e91514194a95145028fa5ef8c
          name: 'NPBackup repository discovery'
          type: TRAP
          key: npbackup.discovery
          delay: '0'
          lifetime: '30d'
          description: 'Discovers NPBackup repository/action combinations via trapper.'
          item_prototypes:
            # --- NPBackup execution metrics ---
            - uuid: 65ffbd74588d46fc8f79c79d5f526e8d
              name: 'NPBackup: Execution state [{#REPO_NAME}, {#ACTION}]'
              type: TRAP
              key: 'npbackup.exec_state[{#REPO_NAME},{#ACTION}]'
              delay: '0'
              value_type: UNSIGNED
              description: 'Execution state: 0=success, 1=warning, 2=error, 3=critical'
              tags:
                - tag: component
                  value: npbackup
                - tag: repo
                  value: '{#REPO_NAME}'
                - tag: action
                  value: '{#ACTION}'
                - tag: group
                  value: '{#GROUP}'
                - tag: backup_job
                  value: '{#BACKUP_JOB}'
                - tag: npversion
                  value: '{#NPVERSION}'
                - tag: audience
                  value: '{#AUDIENCE}'
                - tag: os
                  value: '{#OS}'
                - tag: arch
                  value: '{#ARCH}'
                - tag: tenant
                  value: '{#TENANT_NAME}'
                - tag: optional_tag
                  value: '{#OPTIONAL_TAG}'
            - uuid: a26bd0d7385e444aa97ab4494d72cb27
              name: 'NPBackup: Execution time [{#REPO_NAME}, {#ACTION}]'
              type: TRAP
              key: 'npbackup.exec_time[{#REPO_NAME},{#ACTION}]'
              delay: '0'
              value_type: FLOAT
              units: s
              description: 'Total execution time in seconds'
              tags:
                - tag: component
                  value: npbackup
                - tag: action
                  value: '{#ACTION}'
                - tag: group
                  value: '{#GROUP}'
                - tag: backup_job
                  value: '{#BACKUP_JOB}'
                - tag: npversion
                  value: '{#NPVERSION}'
                - tag: audience
                  value: '{#AUDIENCE}'
                - tag: os
                  value: '{#OS}'
                - tag: arch
                  value: '{#ARCH}'
                - tag: tenant
                  value: '{#TENANT_NAME}'
                - tag: optional_tag
                  value: '{#OPTIONAL_TAG}'
            - uuid: 9d6fd18aa98e49ec9d65b992046a78e1
              name: 'NPBackup: Minimum Backup Size [{#REPO_NAME}, {#ACTION}]'
              type: TRAP
              key: 'npbackup.backup_sub_min_size[{#REPO_NAME},{#ACTION}]'
              delay: '0'
              value_type: UNSIGNED
              description: 'Execution state: 0=success, 1=warning'
              tags:
                - tag: component
