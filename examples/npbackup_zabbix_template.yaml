            - uuid: 4449777f05204dfc834b268c17b5e333
              expression: 'last(/npbackup_trapper/npbackup.exec_state[{#REPO_NAME},{#ACTION}])=3'
              name: 'NPBackup: Critical failure on {#REPO_NAME} ({#ACTION})'
              priority: DISASTER
              description: 'NPBackup reported a critical failure for repo {#REPO_NAME} operation {#ACTION}'
              tags:
                - tag: scope
                  value: availability
            - uuid: 7886e11f6593404f90723c29969591dd
              expression: 'last(/npbackup_trapper/npbackup.exec_state[{#REPO_NAME},{#ACTION}])=2'
              name: 'NPBackup: Error on {#REPO_NAME} ({#ACTION})'
              priority: HIGH
              description: 'NPBackup reported an error for repo {#REPO_NAME} operation {#ACTION}'
              dependencies:
                - name: 'NPBackup: Critical failure on {#REPO_NAME} ({#ACTION})'
                  expression: 'last(/npbackup_trapper/npbackup.exec_state[{#REPO_NAME},{#ACTION}])=3'
              tags:
