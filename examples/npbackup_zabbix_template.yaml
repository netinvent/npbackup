              name: 'NPBackup: No data received for {#REPO_NAME} ({#ACTION}) in 2 days'
              priority: WARNING
              description: 'No backup metrics received for repo {#REPO_NAME} in the last 2 days. Check if scheduled backups are running.'
              tags:
