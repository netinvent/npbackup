                - tag: repo
                  value: '{#REPO_NAME}'
                - tag: action
                  value: '{#ACTION}'
                - tag: group
                  value: '{#GROUP}'
                - tag: backup_job
                  value: '{#BACKUP_JOB}'
                - tag: npversion
                  value: '{#NPVERSION}'
                - tag: audience
                  value: '{#AUDIENCE}'
                - tag: os
                  value: '{#OS}'
                - tag: arch
                  value: '{#ARCH}'
                - tag: tenant
                  value: '{#TENANT_NAME}'
                - tag: optional_tag
